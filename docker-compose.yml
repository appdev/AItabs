services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aitabs-backend
    restart: unless-stopped
    volumes:
      # 数据目录挂载：SQLite 数据库文件持久化存储
      # 迁移数据时只需备份/恢复此目录即可
      # 默认使用宿主机当前目录下的 ./data 文件夹，也可改为绝对路径
      # 例：/your/custom/path/aitabs-data:/app/data
      - ${DATA_DIR:-./data}:/app/data
    environment:
      - DB_PATH=/app/data/aitabs.db
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - PORT=3000
    networks:
      - aitabs-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aitabs-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-6600}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aitabs-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  aitabs-net:
    driver: bridge
