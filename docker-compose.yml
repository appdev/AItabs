services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aitabs-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/aitabs.db
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - PORT=3000
    networks:
      - aitabs-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aitabs-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aitabs-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  aitabs-net:
    driver: bridge

volumes:
  aitabs-data:
